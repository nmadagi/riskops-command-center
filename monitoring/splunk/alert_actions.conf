# ============================================================================
# Splunk Alert Actions — Risk Platform
# ============================================================================
# Deploy to: $SPLUNK_HOME/etc/apps/riskops/local/alert_actions.conf
# ============================================================================

[pagerduty]
param.integration_url = https://events.pagerduty.com/v2/enqueue
param.routing_key = ${PD_ROUTING_KEY}

[slack_notification]
param.webhook_url = ${SLACK_WEBHOOK_URL}
param.channel = #risk-ops-critical

# ─── Alert Action Mappings ───────────────────────────────────────────────────

[Transaction Latency P99 - SLA Breach]
action.pagerduty = 1
action.pagerduty.param.severity = critical
action.pagerduty.param.component = falcon-scoring
action.pagerduty.param.group = risk-platform
action.slack_notification = 1
action.email = 1
action.email.to = risk-platform-oncall@fiserv.com
action.email.subject = CRITICAL: Falcon Scoring P99 Latency SLA Breach

[GoldenGate Replication Lag]
action.pagerduty = 1
action.pagerduty.param.severity = high
action.pagerduty.param.component = oracle-goldengate
action.slack_notification = 1

[Batch Job Failure Detection]
action.pagerduty = 1
action.pagerduty.param.severity = high
action.pagerduty.param.component = control-m-batch
action.slack_notification = 1

[Coherence Cache Hit Ratio]
action.slack_notification = 1
action.email = 1
action.email.to = risk-platform-team@fiserv.com
action.email.subject = WARNING: Coherence Cache Hit Ratio Below Threshold

[JVM GC Pause Duration]
action.slack_notification = 1

[WebSphere Thread Pool Exhaustion]
action.pagerduty = 1
action.pagerduty.param.severity = high
action.slack_notification = 1

[SSL Certificate Expiry Warning]
action.email = 1
action.email.to = risk-platform-team@fiserv.com, infra-certs@fiserv.com
action.email.subject = ACTION REQUIRED: SSL Certificate Expiring Soon

[Transaction Volume Anomaly]
action.slack_notification = 1

[Couchbase Bucket Quota Warning]
action.slack_notification = 1
action.email = 1
action.email.to = risk-platform-team@fiserv.com
