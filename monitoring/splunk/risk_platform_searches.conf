# ============================================================================
# Splunk Saved Searches — Risk Platform Monitoring
# ============================================================================
# Deploy to: $SPLUNK_HOME/etc/apps/riskops/local/savedsearches.conf
# Index:     risk_platform
# ============================================================================

[Transaction Latency P99 - SLA Breach]
search = index=risk_platform sourcetype=falcon_scoring \
  | stats p99(response_time_ms) as p99_latency p50(response_time_ms) as p50_latency count by host \
  | where p99_latency > 200 \
  | eval severity=case(p99_latency > 500, "critical", p99_latency > 300, "high", p99_latency > 200, "medium")
dispatch.earliest_time = -5m
dispatch.latest_time = now
cron_schedule = */5 * * * *
is_scheduled = 1
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 15m
action.pagerduty = 1
action.pagerduty.severity = critical
description = Alerts when transaction scoring P99 latency exceeds 200ms SLA threshold

[Error Rate by Service]
search = index=risk_platform level=ERROR \
  | timechart span=5m count as error_count by service_name \
  | where error_count > 50
dispatch.earliest_time = -15m
dispatch.latest_time = now
cron_schedule = */5 * * * *
is_scheduled = 1
alert.severity = 3
description = Monitors error rate across all risk services, alerts on spikes > 50/5min

[Coherence Cache Hit Ratio]
search = index=risk_platform sourcetype=coherence_stats \
  | stats avg(hit_ratio) as avg_hit_rate latest(size) as cache_size by cache_name \
  | where avg_hit_rate < 0.95 \
  | eval hit_pct=round(avg_hit_rate*100, 2)
dispatch.earliest_time = -10m
dispatch.latest_time = now
cron_schedule = */10 * * * *
is_scheduled = 1
alert.severity = 3
description = Detects Coherence cache hit ratio degradation below 95% threshold

[GoldenGate Replication Lag]
search = index=oracle sourcetype=ogg_stats \
  | stats latest(lag_seconds) as current_lag max(lag_seconds) as max_lag by trail_name, process_name \
  | where current_lag > 30 \
  | eval severity=case(current_lag > 120, "critical", current_lag > 60, "high", current_lag > 30, "medium")
dispatch.earliest_time = -5m
dispatch.latest_time = now
cron_schedule = */5 * * * *
is_scheduled = 1
alert.severity = 4
action.pagerduty = 1
description = Monitors Oracle GoldenGate replication lag, critical alert > 120s

[JVM GC Pause Duration]
search = index=risk_platform sourcetype=jvm_gc \
  | stats max(gc_pause_ms) as max_gc_pause avg(gc_pause_ms) as avg_gc_pause count as gc_count by host \
  | where max_gc_pause > 500 \
  | eval gc_impact=case(max_gc_pause > 2000, "severe", max_gc_pause > 1000, "high", max_gc_pause > 500, "elevated")
dispatch.earliest_time = -10m
dispatch.latest_time = now
cron_schedule = */10 * * * *
is_scheduled = 1
alert.severity = 3
description = Detects excessive JVM garbage collection pauses affecting transaction processing

[Batch Job Failure Detection]
search = index=risk_platform sourcetype=controlm_events event_type=JOB_ENDED status!=OK \
  | lookup risk_job_criticality.csv job_name OUTPUT criticality, sla_window \
  | where criticality IN ("P1", "P2") \
  | eval alert_msg="Batch job ".job_name." FAILED (criticality: ".criticality.")"
dispatch.earliest_time = -10m
dispatch.latest_time = now
cron_schedule = */5 * * * *
is_scheduled = 1
alert.severity = 4
action.pagerduty = 1
description = Detects P1/P2 batch job failures in Control-M and escalates via PagerDuty

[Couchbase Bucket Quota Warning]
search = index=risk_platform sourcetype=couchbase_stats \
  | stats latest(mem_used) as used latest(mem_total) as total by bucket_name, node \
  | eval pct_used=round(used/total*100, 1) \
  | where pct_used > 85
dispatch.earliest_time = -15m
dispatch.latest_time = now
cron_schedule = */15 * * * *
is_scheduled = 1
alert.severity = 3
description = Warns when Couchbase bucket memory usage approaches quota limit

[WebSphere Thread Pool Exhaustion]
search = index=risk_platform sourcetype=websphere_stats \
  | stats latest(active_threads) as active latest(max_threads) as max by host, pool_name \
  | eval utilization=round(active/max*100, 1) \
  | where utilization > 80
dispatch.earliest_time = -5m
dispatch.latest_time = now
cron_schedule = */5 * * * *
is_scheduled = 1
alert.severity = 3
description = Detects WebSphere thread pool exhaustion which causes request queuing

[SSL Certificate Expiry Warning]
search = index=risk_platform sourcetype=cert_monitor \
  | where days_until_expiry < 30 \
  | sort days_until_expiry \
  | eval urgency=case(days_until_expiry < 7, "critical", days_until_expiry < 14, "high", days_until_expiry < 30, "medium")
dispatch.earliest_time = -24h
dispatch.latest_time = now
cron_schedule = 0 8 * * *
is_scheduled = 1
alert.severity = 2
description = Daily check for SSL certificates approaching expiration across risk platform

[Transaction Volume Anomaly]
search = index=risk_platform sourcetype=falcon_scoring \
  | timechart span=1h count as txn_count \
  | predict txn_count as predicted_count algorithm=LLP5 future_timespan=0 \
  | eval deviation=abs(txn_count - predicted_count) / predicted_count * 100 \
  | where deviation > 30
dispatch.earliest_time = -24h
dispatch.latest_time = now
cron_schedule = 0 * * * *
is_scheduled = 1
alert.severity = 3
description = ML-based anomaly detection for unusual transaction volume patterns
