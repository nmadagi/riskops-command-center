# ============================================================================
# Dynatrace Custom Alerting Rules — Risk Platform
# ============================================================================
# Deploy via Dynatrace Settings API or Configuration-as-Code (Monaco)
# Scope: Risk Platform host group and service tags
# ============================================================================

alerting_profiles:
  - name: "Risk Platform — Critical"
    rules:
      - severity_level: AVAILABILITY
        delay_in_minutes: 0
        tag_filter:
          include: ["risk-platform", "production"]
      - severity_level: ERROR
        delay_in_minutes: 5
        tag_filter:
          include: ["risk-platform", "production"]
      - severity_level: SLOWDOWN
        delay_in_minutes: 3
        tag_filter:
          include: ["risk-platform", "production"]
      - severity_level: RESOURCE_CONTENTION
        delay_in_minutes: 5
        tag_filter:
          include: ["risk-platform", "production"]

custom_metric_alerts:
  # JVM Heap Memory
  - name: "Risk Platform — JVM Heap > 90%"
    description: "JVM heap utilization exceeding 90% on risk platform nodes"
    metric_id: "builtin:tech.jvm.memory.heap.usage"
    threshold: 90
    unit: PERCENT
    alert_condition: ABOVE
    aggregation: AVG
    evaluation_window_minutes: 5
    violating_samples: 3
    dealerting_samples: 5
    severity: CUSTOM_ALERT
    tags:
      - "risk-platform"
      - "production"

  # Response Time P99
  - name: "Risk Platform — Scoring Latency P99 > 200ms"
    description: "Transaction scoring response time P99 exceeding SLA threshold"
    metric_id: "builtin:service.response.time"
    threshold: 200000  # microseconds
    unit: MICRO_SECOND
    alert_condition: ABOVE
    aggregation: PERCENTILE_99
    evaluation_window_minutes: 5
    violating_samples: 3
    dealerting_samples: 5
    severity: PERFORMANCE
    tags:
      - "falcon-scoring"
      - "production"

  # Error Rate
  - name: "Risk Platform — Error Rate > 1%"
    description: "Service error rate exceeding 1% threshold"
    metric_id: "builtin:service.errors.total.rate"
    threshold: 1
    unit: PERCENT
    alert_condition: ABOVE
    aggregation: AVG
    evaluation_window_minutes: 5
    violating_samples: 2
    dealerting_samples: 5
    severity: ERROR
    tags:
      - "risk-platform"

  # GC Suspension Time
  - name: "Risk Platform — GC Suspension > 500ms"
    description: "JVM garbage collection suspension time impacting transaction processing"
    metric_id: "builtin:tech.jvm.memory.gc.suspensionTime"
    threshold: 500
    unit: MILLI_SECOND
    alert_condition: ABOVE
    aggregation: MAX
    evaluation_window_minutes: 10
    violating_samples: 2
    severity: CUSTOM_ALERT
    tags:
      - "risk-platform"

  # Thread Count
  - name: "Risk Platform — Thread Pool Exhaustion"
    description: "Active threads approaching pool maximum"
    metric_id: "builtin:tech.jvm.threads.count"
    threshold: 450  # Pool max typically 500
    alert_condition: ABOVE
    aggregation: MAX
    evaluation_window_minutes: 5
    violating_samples: 3
    severity: RESOURCE_CONTENTION
    tags:
      - "risk-platform"

  # Disk Usage
  - name: "Risk Platform — Disk Usage > 85%"
    description: "Disk space running low on risk platform hosts"
    metric_id: "builtin:host.disk.usedPct"
    threshold: 85
    unit: PERCENT
    alert_condition: ABOVE
    aggregation: AVG
    evaluation_window_minutes: 15
    violating_samples: 3
    severity: RESOURCE_CONTENTION
    tags:
      - "risk-platform"

  # CPU Usage
  - name: "Risk Platform — CPU > 80% sustained"
    description: "High CPU utilization sustained over 10 minutes"
    metric_id: "builtin:host.cpu.usage"
    threshold: 80
    unit: PERCENT
    alert_condition: ABOVE
    aggregation: AVG
    evaluation_window_minutes: 10
    violating_samples: 8
    severity: RESOURCE_CONTENTION
    tags:
      - "risk-platform"

notification_integrations:
  - name: "PagerDuty — Risk Platform"
    type: PAGER_DUTY
    integration_key: "${PD_ROUTING_KEY}"
    alerting_profile: "Risk Platform — Critical"

  - name: "Slack — Risk Ops Critical"
    type: SLACK
    webhook_url: "${SLACK_WEBHOOK_URL}"
    channel: "#risk-ops-critical"
    alerting_profile: "Risk Platform — Critical"
