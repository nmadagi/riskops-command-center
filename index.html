ded OK\") echo \"✓ $job: Completed\" ;;\n    \"Executing\") echo \"◎ $job: Running\" ;;\n    *) echo \"✗ $job: FAILED\" && escalate \"$job\" ;;\n  esac\n}\n\nescalate() {\n  curl -s -X POST \"https://events.pagerduty.com/v2/enqueue\" \\\n    -d \"{\\\"routing_key\\\":\\\"$PD_KEY\\\",\\\"event_action\\\":\\\"trigger\\\",\\\n    \\\"payload\\\":{\\\"summary\\\":\\\"$1 failed\\\",\\\"severity\\\":\\\"high\\\"}}\"\n}\n\nfor j in \"${JOBS[@]}\"; do check_job \"$j\"; done"};const SK=[{jd:"UNIX/Linux production support",demo:"Shell scripts for health, cache, batch monitoring",t:"scripts"},{jd:"Java-based platforms",demo:"JVM metrics, WebSphere deployment runbook",t:"dashboard"},{jd:"Coherence cache management",demo:"Cache hit ratio monitoring, partition health",t:"scripts"},{jd:"Batch job monitoring",demo:"Control-M tracker with PagerDuty escalation",t:"scripts"},{jd:"SLA tracking & incidents",demo:"SLA dashboard, incident lifecycle tracker",t:"incidents"},{jd:"Deploy/validate/rollback",demo:"Interactive deployment runbook with phases",t:"runbook"},{jd:"Post-mortems/RCA",demo:"Structured RCA templates with timeline",t:"incidents"},{jd:"Splunk/Dynatrace/ExtraHop",demo:"Splunk SPL queries, Dynatrace alerts",t:"monitoring"},{jd:"Automation & scripting",demo:"Shell automation with Splunk HEC integration",t:"scripts"},{jd:"Disaster Recovery",demo:"DR scenarios with RTO/RPO tracking",t:"dr"},{jd:"Capacity planning",demo:"Live capacity metrics, node utilization",t:"dashboard"},{jd:"Oracle GoldenGate",demo:"Replication lag monitoring, recovery runbook",t:"dr"},{jd:"NoSQL (Couchbase/Coherence)",demo:"Bucket monitoring, cluster health",t:"monitoring"},{jd:"CI/CD & config management",demo:"Jenkins pipeline, Git config snapshots",t:"runbook"},{jd:"ITIL production support",demo:"Incident→Problem→Change workflow",t:"incidents"}];const rb=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;const rf=(a,b)=>(Math.random()*(b-a)+a).toFixed(1);const ts=()=>new Date().toLocaleTimeString("en-US",{hour1
